[package]
name = "llm-gateway"
version = "0.3.7"
edition = "2021"
description = "LLM gateway — unified provider definitions, TTS synthesis, STT transcription, and LLM client abstractions for OpenAI, Anthropic, Azure, ElevenLabs"

[dev-dependencies]
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dependencies]
distri-types = { path = "../../distri-types", version = "0.3.7" }
async-openai = { version = "0.32.2", features = [
  "completion-types",
  "chat-completion",
  "audio-types",
  "audio",
  "realtime-types",
  "realtime",
] }
async-trait = "0.1"
reqwest = { version = "0.13.2", features = ["json", "form", "query", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
futures = "0.3.31"
futures-util = "0.3.31"
tokio = { version = "1.0", features = ["full"] }
secrecy = { version = "0.10.3", features = ["serde"] }
async-stream = "0.3"
base64 = "0.22"
